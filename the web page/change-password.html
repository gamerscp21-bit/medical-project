<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthSync - Change Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="tailwind-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Atkinson+Hyperlegible+Next:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/shared.css">
</head>
<body class="bg-background font-body-md min-h-screen pb-24">
<header class="fixed top-0 w-full z-50 flex items-center px-margin_mobile h-16 bg-surface border-b border-outline-variant gap-md">
<a href="profile.html" class="material-symbols-outlined text-primary hover:bg-surface-container-high p-2 rounded-full active:scale-95 transition-all">arrow_back</a>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Change Password</h1>
</header>
<main class="pt-20 px-margin_mobile max-w-lg mx-auto space-y-md">
<form id="pw-form" class="glass-card rounded-xl p-lg space-y-md">
<div><label class="text-label-sm text-on-surface-variant">Current Password</label><input type="password" required class="w-full mt-1 px-4 py-3 rounded-xl border border-outline-variant bg-surface focus:border-primary outline-none"></div>
<div><label class="text-label-sm text-on-surface-variant">New Password</label><input type="password" required minlength="8" class="w-full mt-1 px-4 py-3 rounded-xl border border-outline-variant bg-surface focus:border-primary outline-none"></div>
<div><label class="text-label-sm text-on-surface-variant">Confirm New Password</label><input type="password" required class="w-full mt-1 px-4 py-3 rounded-xl border border-outline-variant bg-surface focus:border-primary outline-none"></div>
<button type="submit" class="w-full py-3 bg-primary text-on-primary rounded-full font-bold active:scale-[0.98] transition-all">Update Password</button>
</form>
</main>
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 pb-safe bg-surface h-16 border-t border-outline-variant shadow-lg">
<a href="feed.html" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-95"><span class="material-symbols-outlined">rss_feed</span><span class="font-label-sm text-label-sm">Feed</span></a>
<a href="dashboard.html" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-95"><span class="material-symbols-outlined">dashboard</span><span class="font-label-sm text-label-sm">Dashboard</span></a>
<a href="action.html" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-95"><span class="material-symbols-outlined">add_circle</span><span class="font-label-sm text-label-sm">Actions</span></a>
<a href="schedule.html" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-95"><span class="material-symbols-outlined">event_note</span><span class="font-label-sm text-label-sm">Schedule</span></a>
<a href="more.html" class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-2xl px-4 py-1 transition-all active:scale-95"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">menu</span><span class="font-label-sm text-label-sm">More</span></a>
</nav>
<script src="scripts/animations.js"></script>
<script src="scripts/app.js"></script>
<script>
document.getElementById('pw-form').addEventListener('submit', e => {
  e.preventDefault();
  const fields = e.target.querySelectorAll('input');
  if (fields[1].value !== fields[2].value) return HealthSyncApp.toast('Passwords do not match', 'error');
  if (fields[1].value.length < 8) return HealthSyncApp.toast('Password must be 8+ characters', 'error');
  HealthSyncApp.toast('Password updated successfully!');
  setTimeout(() => HealthSyncApp.navigate('profile.html'), 1200);
});
</script>
</body>
</html>
