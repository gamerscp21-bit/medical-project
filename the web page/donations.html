<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthSync - Donations</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="tailwind-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Atkinson+Hyperlegible+Next:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/shared.css">
</head>
<body class="bg-background text-on-background font-body-md min-h-screen pb-24">
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-margin_mobile h-16 bg-surface border-b border-outline-variant">
<a href="more.html" class="material-symbols-outlined text-primary hover:bg-surface-container-high p-2 rounded-full active:scale-95 transition-all ml-margin_mobile">arrow_back</a>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary absolute left-1/2 -translate-x-1/2">Donations</h1>
<div class="w-10"></div>
</header>
<main class="pt-20 px-margin_mobile max-w-lg mx-auto space-y-lg">
<section class="glass-card rounded-2xl p-lg border-t-4 border-tertiary text-center">
<span class="material-symbols-outlined text-tertiary text-5xl mb-md" style="font-variation-settings:'FILL' 1">volunteer_activism</span>
<h2 class="font-title-md text-title-md">Support Healthcare Initiatives</h2>
<p class="text-on-surface-variant text-sm mt-2">Your donation helps provide medical patches and telehealth access to underserved communities.</p>
</section>
<section class="space-y-md">
<p class="text-label-sm uppercase tracking-widest text-on-surface-variant">Select Amount (EGP)</p>
<div class="grid grid-cols-3 gap-3" id="amount-grid">
<button class="amount-btn py-3 rounded-xl border-2 border-outline-variant font-bold hover:border-primary transition-all active:scale-95" data-amount="100">100</button>
<button class="amount-btn py-3 rounded-xl border-2 border-outline-variant font-bold hover:border-primary transition-all active:scale-95" data-amount="250">250</button>
<button class="amount-btn py-3 rounded-xl border-2 border-primary bg-primary-container/20 font-bold active:scale-95" data-amount="500">500</button>
<button class="amount-btn py-3 rounded-xl border-2 border-outline-variant font-bold hover:border-primary transition-all active:scale-95" data-amount="1000">1,000</button>
<button class="amount-btn py-3 rounded-xl border-2 border-outline-variant font-bold hover:border-primary transition-all active:scale-95 col-span-2" data-amount="custom">Custom</button>
</div>
<input id="custom-amount" type="number" placeholder="Enter custom amount" class="hidden w-full px-4 py-3 rounded-xl border border-outline-variant bg-surface focus:border-primary outline-none">
</section>
<section class="glass-card rounded-xl p-md space-y-sm">
<label class="text-label-sm text-on-surface-variant">Cause</label>
<select class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-surface focus:border-primary outline-none">
<option>Free Medical Patches for Children</option>
<option>Rural Telehealth Access</option>
<option>Emergency Response Fund</option>
</select>
</section>
<button id="donate-btn" class="w-full py-4 bg-tertiary text-on-tertiary-container rounded-full font-bold shadow-md hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">favorite</span> Donate 500 EGP
</button>
</main>
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 pb-safe bg-surface h-16 border-t border-outline-variant shadow-lg">
<a href="feed.html" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-95"><span class="material-symbols-outlined">rss_feed</span><span class="font-label-sm text-label-sm">Feed</span></a>
<a href="dashboard.html" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-95"><span class="material-symbols-outlined">dashboard</span><span class="font-label-sm text-label-sm">Dashboard</span></a>
<a href="action.html" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-95"><span class="material-symbols-outlined">add_circle</span><span class="font-label-sm text-label-sm">Actions</span></a>
<a href="schedule.html" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-95"><span class="material-symbols-outlined">event_note</span><span class="font-label-sm text-label-sm">Schedule</span></a>
<a href="more.html" class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-2xl px-4 py-1 transition-all active:scale-95"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">menu</span><span class="font-label-sm text-label-sm">More</span></a>
</nav>
<script src="scripts/animations.js"></script>
<script src="scripts/app.js"></script>
<script>
let selected = 500;
document.querySelectorAll('.amount-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.amount-btn').forEach(b => { b.classList.remove('border-primary','bg-primary-container/20'); b.classList.add('border-outline-variant'); });
    btn.classList.add('border-primary','bg-primary-container/20');
    btn.classList.remove('border-outline-variant');
    const custom = document.getElementById('custom-amount');
    if (btn.dataset.amount === 'custom') { custom.classList.remove('hidden'); custom.focus(); selected = parseInt(custom.value)||0; }
    else { custom.classList.add('hidden'); selected = parseInt(btn.dataset.amount); }
    document.getElementById('donate-btn').innerHTML = `<span class="material-symbols-outlined">favorite</span> Donate ${selected.toLocaleString()} EGP`;
  });
});
document.getElementById('custom-amount').addEventListener('input', e => {
  selected = parseInt(e.target.value)||0;
  document.getElementById('donate-btn').innerHTML = `<span class="material-symbols-outlined">favorite</span> Donate ${selected.toLocaleString()} EGP`;
});
document.getElementById('donate-btn').addEventListener('click', () => {
  if (selected < 1) { HealthSyncApp.toast('Please select an amount', 'error'); return; }
  HealthSyncApp.toast(`Thank you! ${selected} EGP donation received.`);
  setTimeout(() => HealthSyncApp.navigate('more.html'), 1500);
});
</script>
</body>
</html>
